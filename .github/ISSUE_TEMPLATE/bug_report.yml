name: Bug report
description: Report a reproducible defect in Parad0x Media Engine
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What broke
      description: Describe the defect directly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Paste the exact command, input type, and observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, FFmpeg/FFprobe version, and whether custom tool paths were used.
    validations:
      required: true
