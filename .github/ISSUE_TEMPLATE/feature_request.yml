name: Feature request
description: Propose a focused improvement to Parad0x Media Engine
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or product problem is not solved well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Keep it concrete. Avoid vague ambition without mechanics.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs
      description: Call out speed, quality, complexity, licensing, or compatibility costs.
    validations:
      required: false
